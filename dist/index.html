<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileDrop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --surface-light: #334155;
            --text: #E2E8F0;
            --text-secondary: #94A3B8;
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --success: #4ADE80;
            --warning: #FBBF24;
            --error: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--surface-light);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--surface-light);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            font-size: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
        }

        .device-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .device-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .device-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .device-item:hover {
            background: var(--surface-light);
        }

        .device-item.selected {
            background: var(--primary);
        }

        .device-item.paired {
            border-left: 3px solid var(--success);
        }

        .device-icon {
            width: 40px;
            height: 40px;
            background: var(--surface-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .device-item.selected .device-icon {
            background: rgba(255, 255, 255, 0.2);
        }

        .device-details {
            flex: 1;
        }

        .device-name {
            font-weight: 500;
            font-size: 14px;
        }

        .device-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .device-item.selected .device-status {
            color: rgba(255, 255, 255, 0.8);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.pending {
            background: var(--warning);
        }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 设备详情卡片 */
        .device-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .device-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .device-card-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .device-card-info h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .device-card-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .device-actions {
            display: flex;
            gap: 12px;
        }

        /* 文件传输区域 */
        .transfer-zone {
            flex: 1;
            background: var(--surface);
            border-radius: 12px;
            border: 2px dashed var(--surface-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .transfer-zone:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .transfer-zone.drag-over {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .transfer-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .transfer-text {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
        }

        .transfer-text strong {
            color: var(--text);
            display: block;
            margin-bottom: 8px;
        }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* 状态栏 */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 320px;
            right: 0;
            padding: 12px 32px;
            background: var(--surface);
            border-top: 1px solid var(--surface-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            width: 480px;
            max-width: 90%;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface-light);
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: flex;
            gap: 8px;
        }

        .form-row .form-input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 - 设备列表 -->
        <aside class="sidebar">
            <div class="header">
                <div class="logo">
                    <span class="logo-icon">📡</span>
                    <span class="logo-text">FileDrop</span>
                </div>
                <div class="device-info" id="deviceInfo">正在初始化...</div>
            </div>

            <div class="device-list" id="deviceList">
                <div class="section-title">
                    <span>已配对设备</span>
                </div>
                <div id="pairedDevices"></div>

                <div class="section-title" style="margin-top: 20px;">
                    <span>新设备</span>
                </div>
                <div id="newDevices"></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <div class="toolbar">
                <h1 class="page-title">文件传输</h1>
                <button class="btn btn-secondary" onclick="showSettings()">
                    ⚙️ 设置
                </button>
            </div>

            <div id="contentArea">
                <!-- 动态内容 -->
            </div>
        </main>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-text">
                <span class="status-indicator"></span>
                <span id="statusText">正在搜索设备...</span>
            </div>
            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="showDebugInfo()">
                🔍 调试信息
            </button>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">设置</h3>
                <button class="modal-close" onclick="hideSettings()">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">接收文件保存位置</label>
                <div class="form-row">
                    <input type="text" class="form-input" id="savePath" readonly>
                    <button class="btn btn-secondary" onclick="chooseFolder()">浏览...</button>
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveSettings()" style="width: 100%;">
                保存设置
            </button>
        </div>
    </div>

    <script>
        // 全局状态
        let myDevice = null;
        let selectedDevice = null;
        let pairedDevices = [];
        let discoveredDevices = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initDevice();
            startDiscovery();
            loadSettings();
        });

        // 初始化设备信息
        async function initDevice() {
            try {
                myDevice = await invoke('get_device_info');
                document.getElementById('deviceInfo').textContent =
                    `${myDevice.name} (${myDevice.id})`;
            } catch (e) {
                console.error('获取设备信息失败:', e);
                document.getElementById('deviceInfo').textContent = '获取信息失败';
            }
        }

        // 开始发现设备
        async function startDiscovery() {
            try {
                await refreshDevices();
                setInterval(refreshDevices, 3000);
            } catch (e) {
                console.error('启动设备发现失败:', e);
            }
        }

        // 刷新设备列表
        async function refreshDevices() {
            try {
                const devices = await invoke('get_discovered_devices');
                updateDeviceList(devices);
            } catch (e) {
                console.error('刷新设备列表失败:', e);
            }
        }

        // 更新设备列表显示
        function updateDeviceList(devices) {
            pairedDevices = devices.filter(d => d.is_paired);
            discoveredDevices = devices.filter(d => !d.is_paired);

            // 更新已配对设备
            const pairedContainer = document.getElementById('pairedDevices');
            pairedContainer.innerHTML = pairedDevices.map(d => `
                <div class="device-item paired ${selectedDevice?.id === d.id ? 'selected' : ''}"
                     onclick="selectDevice('${d.id}')">
                    <div class="device-icon">💻</div>
                    <div class="device-details">
                        <div class="device-name">${d.name}</div>
                        <div class="device-status">${d.ip} • 已配对</div>
                    </div>
                    <div class="status-dot"></div>
                </div>
            `).join('') || '<div style="color: var(--text-secondary); padding: 12px;">暂无已配对设备</div>';

            // 更新新设备
            const newContainer = document.getElementById('newDevices');
            newContainer.innerHTML = discoveredDevices.map(d => `
                <div class="device-item ${selectedDevice?.id === d.id ? 'selected' : ''}"
                     onclick="selectDevice('${d.id}')">
                    <div class="device-icon">💻</div>
                    <div class="device-details">
                        <div class="device-name">${d.name}</div>
                        <div class="device-status">${d.ip} • 未配对</div>
                    </div>
                    <div class="status-dot pending"></div>
                </div>
            `).join('') || '<div style="color: var(--text-secondary); padding: 12px;">未发现新设备</div>';

            // 更新状态文本
            const totalDevices = devices.length;
            document.getElementById('statusText').textContent =
                totalDevices > 0 ? `已发现 ${totalDevices} 个设备` : '正在搜索设备...';
        }

        // 选择设备
        function selectDevice(deviceId) {
            const allDevices = [...pairedDevices, ...discoveredDevices];
            selectedDevice = allDevices.find(d => d.id === deviceId);
            updateDeviceList([...pairedDevices, ...discoveredDevices]);
            showDeviceDetail();
        }

        // 显示设备详情
        function showDeviceDetail() {
            const contentArea = document.getElementById('contentArea');

            if (!selectedDevice) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <h3>选择一个设备开始传输</h3>
                        <p>从左侧列表选择一个设备，开始传输文件</p>
                    </div>
                `;
                return;
            }

            const isPaired = selectedDevice.is_paired;

            contentArea.innerHTML = `
                <div class="device-card">
                    <div class="device-card-header">
                        <div class="device-card-icon">💻</div>
                        <div class="device-card-info">
                            <h2>${selectedDevice.name}</h2>
                            <p>${selectedDevice.ip}:${selectedDevice.port} • ${isPaired ? '已配对' : '未配对'}</p>
                        </div>
                    </div>
                    <div class="device-actions">
                        ${!isPaired ? `
                            <button class="btn btn-primary" onclick="pairDevice()">
                                🔒 配对设备
                            </button>
                        ` : ''}
                        <button class="btn btn-primary" ${!isPaired ? 'disabled' : ''} onclick="selectFile()">
                            📤 发送文件
                        </button>
                    </div>
                </div>

                <div class="transfer-zone" id="transferZone"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)"
                     onclick="${isPaired ? 'selectFile()' : ''}">
                    <div class="transfer-icon">📁</div>
                    <div class="transfer-text">
                        <strong>${isPaired ? '点击或拖放文件到此处' : '请先配对设备'}</strong>
                        ${isPaired ? '支持任意类型文件，单次最大 1GB' : '配对后即可传输文件'}
                    </div>
                </div>
            `;
        }

        // 配对设备
        async function pairDevice() {
            if (!selectedDevice) return;

            try {
                await invoke('send_pair_request', { deviceId: selectedDevice.id });
                await invoke('accept_pair', { deviceId: selectedDevice.id });
                alert(`已与 ${selectedDevice.name} 配对成功！`);
                await refreshDevices();
            } catch (e) {
                alert('配对失败: ' + e);
            }
        }

        // 选择文件
        async function selectFile() {
            if (!selectedDevice) return;

            try {
                const path = await invoke('select_file');
                if (path) {
                    await sendFile(path);
                }
            } catch (e) {
                console.error('选择文件失败:', e);
            }
        }

        // 发送文件
        async function sendFile(filePath) {
            if (!selectedDevice || !filePath) return;

            try {
                document.getElementById('statusText').textContent = '正在发送文件...';
                await invoke('send_file', {
                    deviceId: selectedDevice.id,
                    filePath: filePath
                });
                alert('文件发送成功！');
                document.getElementById('statusText').textContent = '就绪';
            } catch (e) {
                alert('发送失败: ' + e);
                document.getElementById('statusText').textContent = '发送失败';
            }
        }

        // 拖放处理
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            // 拖放功能简化处理
            selectFile();
        }

        // 设置相关
        function showSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function hideSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        async function chooseFolder() {
            try {
                const path = await invoke('select_folder');
                if (path) {
                    document.getElementById('savePath').value = path;
                }
            } catch (e) {
                console.error('选择文件夹失败:', e);
            }
        }

        async function saveSettings() {
            const path = document.getElementById('savePath').value;
            try {
                await invoke('set_save_path', { path });
                alert('设置已保存');
                hideSettings();
            } catch (e) {
                alert('保存失败: ' + e);
            }
        }

        async function loadSettings() {
            try {
                const path = await invoke('get_save_path');
                document.getElementById('savePath').value = path;
            } catch (e) {
                console.error('加载设置失败:', e);
            }
        }

        // 调试信息
        async function showDebugInfo() {
            try {
                const info = await invoke('get_device_info');
                const path = await invoke('get_save_path');
                alert(`调试信息:

设备名称: ${info.name}
设备 ID: ${info.id}
本机 IP: ${info.ip || '获取中...'}
服务端口: ${info.port}

保存路径: ${path}

如果无法发现设备，请检查:
1. 两台设备在同一 WiFi 网络
2. 防火墙允许端口 ${info.port}
3. 路由器未禁用 mDNS/Bonjour`);
            } catch (e) {
                alert('获取信息失败: ' + e);
            }
        }

        // 模拟 invoke 函数（用于测试）
        async function invoke(cmd, args = {}) {
            // 实际运行时会被 Tauri 替换
            console.log('Invoke:', cmd, args);

            // 模拟响应
            if (cmd === 'get_device_info') {
                return { id: 'test123', name: 'MacBook-Pro', ip: '192.168.1.100', port: 8765 };
            }
            if (cmd === 'get_discovered_devices') {
                return [
                    { id: 'device1', name: 'Windows-PC', ip: '192.168.1.101', port: 8765, is_paired: false }
                ];
            }
            if (cmd === 'get_save_path') {
                return '/Users/xiami/Downloads';
            }
            return null;
        }
    </script>
</body>
</html>
