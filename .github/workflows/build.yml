name: Build FileDrop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask requests zeroconf

      - name: Build macOS app
        run: |
          pyinstaller --onefile --windowed --name FileDrop filedrop.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: filedrop-macos
          path: dist/FileDrop

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask requests zeroconf

      - name: Build Windows exe
        run: |
          pyinstaller --onefile --windowed --name FileDrop filedrop.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: filedrop-windows
          path: dist/FileDrop.exe
