name: Build FileDrop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.0.0-beta --locked

      - name: Build macOS app
        run: cargo tauri build --target aarch64-apple-darwin
        env:
          CI: true

      - name: Build macOS x64 app
        run: cargo tauri build --target x86_64-apple-darwin
        env:
          CI: true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: filedrop-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.0.0-beta --locked

      - name: Build Windows app
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          CI: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: filedrop-windows
          path: src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.0.0-beta --locked

      - name: Build Linux app
        run: cargo tauri build --target x86_64-unknown-linux-gnu
        env:
          CI: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: filedrop-linux
          path: src-tauri/target/release/bundle/deb/*.deb
